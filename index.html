<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Application de gestion scolaire" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Edu-Nify</title>
  </head>
  <body>
    <div id="root">
      <div id="error-display" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: red; padding: 20px; z-index: 9999; font-family: monospace; overflow: auto;">
        <h1 style="color: red;">Erreur Critique Détectée</h1>
        <p>L'application n'a pas pu démarrer. Voici les détails de l'erreur :</p>
        <pre id="error-details"></pre>
        <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true);" style="padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer;">Réinitialiser et Recharger</button>
      </div>
      <div id="loading-display" style="height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f9fafb; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
          <p style="color: #4b5563; font-weight: 500;">Chargement de Edu-Nify...</p>
          <button onclick="localStorage.clear(); sessionStorage.clear(); caches.keys().then(names => names.forEach(name => caches.delete(name))); location.reload(true);" style="margin-top: 20px; background: none; border: none; color: #4f46e5; text-decoration: underline; cursor: pointer; font-size: 12px;">
            Problème de chargement ? Cliquez ici pour réinitialiser
          </button>
        </div>
      </div>
    </div>
    <script>
      // Capture early PWA install prompts
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
      });

      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('loading-display').style.display = 'none';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-details').textContent = 
          'Message: ' + msg + '\n' +
          'URL: ' + url + '\n' +
          'Ligne: ' + lineNo + '\n' +
          'Colonne: ' + columnNo + '\n' +
          'Erreur: ' + JSON.stringify(error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('loading-display').style.display = 'none';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-details').textContent = 
          'Promesse rejetée non gérée: ' + event.reason;
      };

      // Smart Auto-Heal: if application screen hangs, unregister bad service workers, clear caches and reload once
      setTimeout(function() {
        var loader = document.getElementById('loading-display');
        var errorDisplay = document.getElementById('error-display');
        var hasMounted = window.reactMounted || (loader && loader.style.display === 'none') || !loader;
        
        if (!hasMounted && (!errorDisplay || errorDisplay.style.display !== 'block')) {
          console.warn("Edu-Nify: Loading hung or white screen detected. Auto-repairing caches...");
          
          var reloadCount = parseInt(sessionStorage.getItem('autoHealReloadCount') || '0', 10);
          if (reloadCount < 2) {
            sessionStorage.setItem('autoHealReloadCount', (reloadCount + 1).toString());
            
            // Unregister service workers
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                }
              });
            }
            
            // Clear caches
            if ('caches' in window) {
              caches.keys().then(function(keys) {
                keys.forEach(function(key) { caches.delete(key); });
              });
            }
            
            // Clear storage and reload
            localStorage.clear();
            setTimeout(function() {
              window.location.reload(true);
            }, 600);
          } else {
            // If already reloaded 2 times, don't loop endlessly. Show the manual reset option.
            if (loader) {
              loader.innerHTML = '<div style="text-align: center; padding: 20px;">' +
                '<h2 style="color: #4f46e5; margin-bottom: 10px;">Problème de démarrage persistant</h2>' +
                '<p style="color: #4b5563; margin-bottom: 20px;">Le navigateur conserve des ressources obsolètes ou corrompues.</p>' +
                '<button onclick="localStorage.clear(); sessionStorage.clear(); sessionStorage.removeItem(\'autoHealReloadCount\'); caches.keys().then(names => names.forEach(name => caches.delete(name))); location.reload(true);" ' +
                'style="padding: 10px 20px; background-color: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);">' +
                'Vider le Cache & Forcer le Rechargement' +
                '</button>' +
                '</div>';
            }
          }
        }
      }, 5500);
    </script>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
